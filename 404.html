<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <title>Studio Totti</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Playfair+Display:wght@500&family=Work+Sans&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/lightbox/css/lightbox.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Spinner Start -->
    <div id="spinner"
        class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Carregando...</span>
        </div>
    </div>
    <!-- Spinner End -->

    <!-- Navbar Start -->
      <div class="container-fluid bg-light sticky-top p-0">
        <div id="header-placeholder"></div>
    </div>
    <!-- Navbar End -->

    <!-- Hero Start -->
    <div class="container-fluid bg-light page-header py-5 mb-5">
        <div class="container text-center py-5">
            <h1 class="display-1 animated slideInLeft">Erro 404</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb justify-content-center animated slideInLeft mb-0">
                    <li class="breadcrumb-item"><a class="text-primary" href="#">Início</a></li>
                    <li class="breadcrumb-item"><a class="text-primary" href="#">Páginas</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Erro 404</li>
                </ol>
            </nav>
        </div>
    </div>
    <!-- Hero End -->

    <!-- 404 Start -->
    <div class="container-fluid py-5 wow fadeIn" data-wow-delay="0.1s">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <i class="bi bi-exclamation-triangle display-1 text-primary"></i>
                    <h1 class="display-1">404</h1>
                    <h1 class="mb-4">Página Não Encontrada</h1>
                    <p class="mb-4">Desculpe, a página que você procurou não existe em nosso site! Que tal voltar para a página inicial ou usar a busca?</p>
                    <a class="btn btn-primary py-3 px-4" href="">Voltar para o Início</a>
                </div>
            </div>
        </div>
    </div>
    <!-- 404 End -->

    
    <!-- Footer + copyright dinâmico -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript Libraries -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/counterup/counterup.min.js"></script>
    <script src="lib/lightbox/js/lightbox.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>
 <!-- Carregamento dinâmico dos componentes comuns -->
<script>
$(function(){
    // Carrega o header/navbar (está em includes/)
    $("#header-placeholder").load("includes/header.html", function(response, status, xhr) {
        if (status === "error") {
            console.error("Erro ao carregar includes/header.html: " + xhr.status);
            // Mostra mensagem de erro visível (opcional)
            $("#header-placeholder").html('<div class="alert alert-danger text-center">Falha ao carregar o cabeçalho</div>');
        } else {
            // Opcional: código extra após carregar (ex: eventos dos botões Dia/Semana)
            console.log("Header carregado com sucesso");
        }
    });

    // Carrega o footer
    $("#footer-placeholder").load("includes/footer.html", function(response, status, xhr) {
        if (status === "error") {
            console.error("Erro ao carregar includes/footer.html: " + xhr.status);
            $("#footer-placeholder").html('<div class="alert alert-danger text-center">Falha ao carregar o rodapé</div>');
        } else {
            // Atualiza o ano automaticamente
            const anoSpan = document.getElementById("anoAtual");
            if (anoSpan) {
                anoSpan.textContent = new Date().getFullYear();
            }
            console.log("Footer carregado com sucesso");
        }
    });
});
</script>
<script>
function abrirMapa() {
    document.getElementById("mapModal").style.display = "block";
}

function fecharMapa() {
    document.getElementById("mapModal").style.display = "none";
}

// fechar ao clicar fora
window.onclick = function(event) {
    const modal = document.getElementById("mapModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>
</body>
</html>
